name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU deps)
        # dev (pytest/ruff/black/httpx) + data (pyarrow/duckdb/shapely/requests)
        # + api (fastapi/uvicorn/pydantic) — required to import the api/copilot/
        # optimizer/transit/demo test modules. GPU ([gpu]) and AI ([ai]) extras are
        # Spark-only. [sim] (aequilibrae) is NOT needed: the oracle test uses
        # committed TNTP fixtures and the aequilibrae cross-check is importorskip-d.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,api]"

      - name: Lint (ruff + black)
        run: |
          ruff check src tests
          black --check src tests

      - name: Test (CPU only — spark-marked tests skipped)
        run: pytest -q -m "not spark"
