name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU dev deps)
        # GPU ([gpu]) and AI ([ai]) extras are Spark-only and never installed in CI.
        # The sim oracle extra ([sim], aequilibrae) is added here in P04 when the
        # equilibrium engine's oracle tests land.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff + black)
        run: |
          ruff check src tests
          black --check src tests

      - name: Test (CPU only — spark-marked tests skipped)
        run: pytest -q -m "not spark"
