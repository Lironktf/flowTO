name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  schedule:
    # Nightly full suite (incl. `slow` full-fidelity sim + demo) at 08:00 UTC.
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  # Fast PR signal: lint + the full suite MINUS the handful of minutes-long
  # full-fidelity tests (`slow`). Runs on every push + PR. ~1 min.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU deps)
        # dev (pytest/pytest-xdist/ruff/black/httpx) + data (pyarrow/duckdb/
        # shapely/requests) + api (fastapi/uvicorn/pydantic) — required to import
        # the api/copilot/optimizer/transit/demo test modules. GPU ([gpu]) and AI
        # ([ai]) extras are Spark-only. [sim] (aequilibrae) is NOT needed: the
        # oracle test uses committed TNTP fixtures and the aequilibrae cross-check
        # is importorskip-d.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,api]"

      - name: Lint (ruff + black)
        run: |
          ruff check src tests
          black --check src tests

      - name: Test (CPU, parallel — spark + heavy full-fidelity tests skipped)
        # `heavy` = the minutes-long full-scale assignment tests (the demo
        # guarantee + the 81k-edge end-to-end sim). Their mechanism is covered
        # fast here (small graphs / reduced demand); the real-scale numbers run
        # nightly in the `full` job below. The cheap `slow` correctness anchors
        # (equilibrium oracle vs published SiouxFalls) still run on every PR.
        # `loadscope` keeps each module's tests on one worker so module-scoped
        # fixtures build once.
        run: pytest -q -n auto --dist loadscope -m "not spark and not heavy"

  # Full suite incl. `slow` full-fidelity tests. Nightly + on main + manual.
  # The minutes-long real-scale demo/sim run here, not on every PR.
  full:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,data,api]"

      - name: Test (CPU, parallel — full suite incl. slow; spark skipped)
        run: pytest -q -n auto --dist loadscope -m "not spark"
